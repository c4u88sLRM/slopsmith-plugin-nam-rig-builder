name: Debug macOS single VST3 (CitrusAD50)

on:
  workflow_dispatch:
    inputs:
      dpf_ref:
        description: "DPF ref (branch/tag/sha)"
        required: false
        default: "master"

permissions:
  contents: write

jobs:
  build-single:
    runs-on: macos-latest
    env:
      EFFECT_DIR: vst/src/amps/CitrusAD50
      TARGET_BUNDLE: vst/amps/CitrusAD50.vst3
      BIN_NAME: CitrusAD50

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config user.name "macos-vst-bot"
          git config user.email "macos-vst-bot@users.noreply.github.com"

      - name: Clone DPF
        run: |
          set -euxo pipefail
          rm -rf "${GITHUB_WORKSPACE}/vst/DPF"
          git clone --depth 1 --branch "${{ github.event.inputs.dpf_ref || 'master' }}" https://github.com/DISTRHO/DPF.git "${GITHUB_WORKSPACE}/vst/DPF"

      - name: Build CitrusAD50 VST3
        run: |
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}/${EFFECT_DIR}"
          rm -rf build bin
          make -j2 \
            DPF_PATH="${GITHUB_WORKSPACE}/vst/DPF" \
            DPF_BUILD_DIR="$PWD/build" \
            DPF_TARGET_DIR="$PWD/bin" \
            vst3

      - name: Locate built + existing binaries and hash
        id: hashes
        run: |
          set -euxo pipefail
          built="$(find "${GITHUB_WORKSPACE}/${EFFECT_DIR}/bin" -type f -name "${BIN_NAME}" | head -n1)"
          repo_bin="${GITHUB_WORKSPACE}/${TARGET_BUNDLE}/Contents/MacOS/${BIN_NAME}"

          if [ -z "$built" ]; then
            echo "ERROR: built binary not found for ${BIN_NAME}"
            exit 1
          fi

          echo "built=$built" >> "$GITHUB_OUTPUT"
          echo "repo_bin=$repo_bin" >> "$GITHUB_OUTPUT"

          mkdir -p "${GITHUB_WORKSPACE}/_debug"

          shasum -a 256 "$built" | tee "${GITHUB_WORKSPACE}/_debug/built.sha256.txt"
          if [ -f "$repo_bin" ]; then
            shasum -a 256 "$repo_bin" | tee "${GITHUB_WORKSPACE}/_debug/repo-before.sha256.txt"
          else
            echo "MISSING $repo_bin" | tee "${GITHUB_WORKSPACE}/_debug/repo-before.sha256.txt"
          fi

          ls -la "$built" | tee "${GITHUB_WORKSPACE}/_debug/built.ls.txt"
          ls -la "$(dirname "$repo_bin")" | tee "${GITHUB_WORKSPACE}/_debug/repo-dir.ls.txt" || true

      - name: Upload pre-injection debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: citrusad50-preinject
          path: |
            _debug/*
            ${{ steps.hashes.outputs.built }}
            ${{ steps.hashes.outputs.repo_bin }}
          if-no-files-found: warn

      - name: Inject built binary into committed bundle
        run: |
          set -euxo pipefail
          src="${{ steps.hashes.outputs.built }}"
          dst="${{ steps.hashes.outputs.repo_bin }}"
          mkdir -p "$(dirname "$dst")"
          cp -f "$src" "$dst"
          chmod +x "$dst"
          shasum -a 256 "$dst" | tee "${GITHUB_WORKSPACE}/_debug/repo-after.sha256.txt"
          ls -la "$dst" | tee "${GITHUB_WORKSPACE}/_debug/repo-after.ls.txt"

      - name: Upload post-injection debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: citrusad50-postinject
          path: |
            _debug/*
            ${{ steps.hashes.outputs.built }}
            ${{ steps.hashes.outputs.repo_bin }}
          if-no-files-found: warn

      - name: Commit and push if changed
        run: |
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}"
          git add -f "vst/amps/CitrusAD50.vst3/Contents/MacOS/CitrusAD50"
          if git diff --cached --quiet; then
            echo "No changes to commit for CitrusAD50"
            exit 0
          fi
          git commit -m "Debug macOS rebuild: CitrusAD50"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push

      - name: Cleanup
        if: always()
        run: |
          rm -rf "${GITHUB_WORKSPACE}/vst/DPF"
