name: Build macOS VST3 binaries

# Why: the bundled effects in vst/*.vst3 ship with Windows (Contents/x86_64-win)
# and Linux (Contents/x86_64-linux) binaries built by the sibling workflows, and
# a committed macOS binary at Contents/MacOS/<Name>. When a plugin's source
# changes (e.g. a renamed DISTRHO_PLUGIN_NAME), the committed macOS binary goes
# stale. This workflow rebuilds every DPF plugin for macOS as a UNIVERSAL binary
# (arm64 + x86_64) and injects it back into Contents/MacOS/<Name>, mirroring
# build-linux-vst3.yml / build-windows-vst3.yml.
#
# Run it manually from the Actions tab (workflow_dispatch). It ad-hoc signs each
# bundle (so Gatekeeper/the host doesn't reject the re-written binary) and
# commits the result back to the branch it ran on.

on:
  workflow_dispatch:
    inputs:
      dpf_ref:
        description: "DISTRHO/DPF git ref to build against"
        default: "main"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Clone DPF (with submodules — pugl is needed for the DGL UI)
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.dpf_ref }}" \
            https://github.com/DISTRHO/DPF.git "$GITHUB_WORKSPACE/dpf"
          git -C "$GITHUB_WORKSPACE/dpf" submodule update --init --recursive

      - name: Build every VST3 for macOS (universal arm64 + x86_64)
        run: |
          set +e
          DPF="$GITHUB_WORKSPACE/dpf"
          ARCHS="-arch x86_64 -arch arm64"
          ln -sfn "$DPF" "$GITHUB_WORKSPACE/vst/DPF"

          cd "$GITHUB_WORKSPACE/vst/src"
          for cat in amps pedals racks; do
            if [ -d "$cat" ]; then
              ln -sfn ../../DPF "$cat/DPF" || echo "Warning: could not link $cat/DPF"
            fi
          done
          for cat in amps pedals racks; do
            if [ -d "$cat" ] && [ -d _shared ]; then
              rm -f "$cat/_shared"
              ln -sfn ../_shared "$cat/_shared" || echo "Warning: could not link $cat/_shared"
            fi
          done
          fail=""

          build() {
            ( cd "$1" && rm -rf build bin \
                && make -j3 DPF_PATH="$DPF" DPF_BUILD_DIR="$PWD/build" DPF_TARGET_DIR="$PWD/bin" \
                        CFLAGS="$ARCHS" CXXFLAGS="$ARCHS" LDFLAGS="$ARCHS" vst3 ) \
              || fail="$fail $1"
          }

          [ -f Makefile ] && build .

          # Effects are now TWO levels deep: <cat>/<name>/Makefile (was */Makefile,
          # which matched nothing post-reorg -> "FAILED DIRS: *").
          for mk in */*/Makefile; do
            d=$(dirname "$mk")
            case "$d" in DPF/*|*/DPF|*/_shared|*/mark_shared|RBFinalLeveler/*|*/build) continue;; esac
            echo "==== building $d ===="
            build "$d"
          done

          for cat in amps pedals racks; do rm -f "$cat/_shared"; done
          rm -f "$GITHUB_WORKSPACE/vst/DPF"
          echo "FAILED DIRS:$fail"

      - name: Inject macOS binaries into existing bundles only (no new folders)
        run: |
          cd "$GITHUB_WORKSPACE"

          alias_of() {
            # ... (keep the entire case statement as-is) ...
          }

          injected=0
          missing=0
          failed_binaries=""

          # Use flexible search like Windows workflow: find any Contents/MacOS directory
          # (not strict path matching) and extract binaries from it.
          find vst/src -type d -path '*/Contents/MacOS' | while read -r macbin; do
            # Extract plugin name from built path: vst/src/<cat>/<plugin>/bin/<Name>.vst3/Contents/MacOS
            # Get the .vst3 bundle name (two dirs up from Contents)
            built=$(basename "$(dirname "$(dirname "$macbin")")")
            name="${built%.vst3}"
            mapped="$(alias_of "$built")"

            # Determine destination category from source path
            case "$macbin" in
              vst/src/amps/*)   dest_root="vst/amps";;
              vst/src/pedals/*) dest_root="vst/pedals";;
              vst/src/racks/*)  dest_root="vst/racks";;
              vst/src/bin/*)    dest_root="vst/pedals"; mapped="Qtrix.vst3";;
              *) continue;;
            esac

            # Search for the committed bundle in {amps,pedals,racks}
            bundle=""
            for cat in amps pedals racks; do
              if [ -d "vst/$cat/$mapped" ]; then
                bundle="vst/$cat/$mapped"
                break
              fi
            done

            if [ -n "$bundle" ]; then
              # Check if the binary file exists in the Contents/MacOS directory
              if [ -f "$macbin/$name" ]; then
                out="$bundle/Contents/MacOS/$name"
                mkdir -p "$(dirname "$out")"
                cp -f "$macbin/$name" "$out"
                chmod +x "$out" || true
                codesign --force --sign - "$bundle" || true
                echo "✓ injected: $built -> $bundle"
                injected=$((injected+1))
              else
                echo "✗ WARNING: binary not found at $macbin/$name (build may have failed)"
                failed_binaries="$failed_binaries $built"
                missing=$((missing+1))
              fi
            else
              echo "✗ WARNING: missing target bundle for $mapped (skipped)"
              missing=$((missing+1))
            fi
          done

          echo ""
          echo "======================================================================"
          echo "INJECTION SUMMARY"
          echo "======================================================================"
          echo "injected $injected bundles, skipped $missing (missing bundle or binary)"
          if [ -n "$failed_binaries" ]; then
            echo "Failed to find binaries for:$failed_binaries"
          fi
            else
              echo "WARNING: missing target bundle $bundle (skipped)"
              missing=$((missing+1))
            fi
          done < <(find vst/src -type d -path '*/bin/*.vst3/Contents/MacOS')

          echo "injected $injected bundles, skipped $missing (missing bundle or binary)"
          if [ -n "$failed_binaries" ]; then
            echo "Failed to find binaries for:$failed_binaries"
          fi

      - name: Commit the macOS binaries
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "macos-vst-bot"
          git config user.email "macos-vst-bot@users.noreply.github.com"

          find vst -type f \( -path '*/Contents/MacOS/*' -o -path '*/Contents/_CodeSignature/*' \) -print0 | xargs -0 -r git add

          if git diff --cached --quiet; then
            echo "No macOS binaries to commit (nothing injected or no changes)."
          else
            git commit -m "Rebuild macOS (universal) VST3 binaries for bundled effects"
            git push
          fi

      - name: Upload as artifact too
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-vst3
          path: vst/src/**/bin/*.vst3/**
          if-no-files-found: warn
