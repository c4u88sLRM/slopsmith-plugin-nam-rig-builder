name: Build macOS VST3 binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Clone DPF
        run: |
          git clone --depth 1 https://github.com/DISTRHO/DPF.git "$GITHUB_WORKSPACE/dpf"
          git -C "$GITHUB_WORKSPACE/dpf" submodule update --init --recursive

      - name: Debug: list built macOS bundle names
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "workflow parses and runs"
